services:
  postgres:
    image: postgres:18
    container_name: fritte-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fritte
      POSTGRES_PASSWORD: fritte
      POSTGRES_DB: fritte
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fritte -d fritte"]
      interval: 5s
      timeout: 3s
      retries: 5

  fritte:
    build: .
    image: fritte:latest
    container_name: fritte
    restart: unless-stopped
    ports:
      - "8080"
    environment:
      FRITZ_HOST: "https://fritz.box"
      FRITZ_USERNAME: "${FRITZ_USERNAME:-}"
      FRITZ_PASSWORD: "${FRITZ_PASSWORD:-}"
      POLL_INTERVAL: "30s"
      DASHBOARD_ADDR: ":8080"
      DATABASE_URL: "postgres://fritte:fritte@postgres:5432/fritte?sslmode=disable"
      SYSLOG_HOST: "${SYSLOG_HOST:-}"
      SYSLOG_PORT: "${SYSLOG_PORT:-514}"
      SYSLOG_PROTOCOL: "${SYSLOG_PROTOCOL:-udp}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
